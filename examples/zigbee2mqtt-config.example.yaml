# Beispiel für Zigbee2MQTT.
# network_key, pan_id und ext_pan_id nicht aus einer produktiven Installation übernehmen.

version: 5

mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://127.0.0.1:1883
  # Für einen abgesicherten Broker:
  # user: zigbee2mqtt
  # password: !secret.yaml mqtt_password

serial:
  port: /dev/zigbee
  adapter: zstack

frontend:
  enabled: true
  port: 8080
  # Optional:
  # auth_token: !secret.yaml frontend_token

homeassistant:
  enabled: true

advanced:
  channel: 11
  network_key: GENERATE
  pan_id: GENERATE
  ext_pan_id: GENERATE
